<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RØBLOX — Регистрация</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(145deg, #0f0f1f, #1a1a2e);
        }
        .container {
            background: #2a2a44;
            padding: 40px 35px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            width: 420px;
            text-align: center;
            border: 1px solid #3a3a5a;
        }
        .logo {
            font-size: 42px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-shadow: 0 0 30px rgba(0, 162, 255, 0.3);
        }
        .logo span {
            color: #00a2ff;
        }
        .subtitle {
            color: #aaa;
            font-size: 16px;
            margin-bottom: 24px;
        }
        .input-group {
            margin-bottom: 14px;
            text-align: left;
        }
        .input-group label {
            color: #ccc;
            font-size: 13px;
            font-weight: 600;
            display: block;
            margin-bottom: 4px;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: none;
            background: #1e1e32;
            color: #fff;
            font-size: 15px;
            outline: 1px solid #3a3a5a;
            transition: 0.2s;
        }
        .input-group input:focus, .input-group select:focus {
            outline: 2px solid #00a2ff;
            background: #252540;
        }
        .input-group select {
            appearance: none;
            color: #fff;
        }
        .input-group select option {
            background: #1e1e32;
            color: #fff;
        }
        .input-row {
            display: flex;
            gap: 10px;
        }
        .input-row .input-group {
            flex: 1;
        }
        .radio-group {
            display: flex;
            gap: 16px;
            margin-top: 4px;
        }
        .radio-group label {
            color: #ccc;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .radio-group input {
            width: auto;
            accent-color: #00a2ff;
        }
        .btn {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: #00a2ff;
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 20px rgba(0, 162, 255, 0.3);
        }
        .btn:hover {
            background: #0088dd;
            transform: scale(1.02);
        }
        .terms {
            margin-top: 16px;
            font-size: 12px;
            color: #888;
            line-height: 1.6;
        }
        .terms a {
            color: #00a2ff;
            text-decoration: none;
        }
        .terms a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">RØBLOX<span>.</span></div>
        <div class="subtitle">SIGN UP AND START HAVING FUN!</div>

        <form method="POST" action="login.php">
            <div class="input-row">
                <div class="input-group">
                    <label>Месяц</label>
                    <select name="month">
                        <option>Январь</option><option>Февраль</option><option>Март</option>
                        <option>Апрель</option><option>Май</option><option>Июнь</option>
                        <option>Июль</option><option>Август</option><option>Сентябрь</option>
                        <option>Октябрь</option><option>Ноябрь</option><option>Декабрь</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>День</label>
                    <input type="number" name="day" placeholder="День" min="1" max="31" required>
                </div>
                <div class="input-group">
                    <label>Год</label>
                    <input type="number" name="year" placeholder="Год" min="1900" max="2026" required>
                </div>
            </div>

            <div class="input-group">
                <label>Имя пользователя</label>
                <input type="text" name="username" placeholder="Не используйте настоящее имя" required>
            </div>

            <div class="input-group">
                <label>Пароль</label>
                <input type="password" name="password" placeholder="Не менее 8 символов" minlength="8" required>
            </div>

            <div class="input-group">
                <label>Пол (необязательно)</label>
                <div class="radio-group">
                    <label><input type="radio" name="gender" value="male"> Мужской</label>
                    <label><input type="radio" name="gender" value="female"> Женский</label>
                </div>
            </div>

            <button type="submit" class="btn">Зарегистрироваться</button>
        </form>

        <div class="terms">
            Нажимая «Зарегистрироваться», вы соглашаетесь с нашими
            <a href="#">Условиями использования</a> и
            <a href="#">Политикой конфиденциальности</a>.
        </div>
    </div>
</body>
</html>
