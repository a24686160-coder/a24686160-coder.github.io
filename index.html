<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT Search Tools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #0f0f1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 20px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            border: 1px solid #2a2a4a;
        }
        h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 25px;
            font-size: 28px;
            letter-spacing: 1px;
        }
        h1 span {
            color: #00a2ff;
        }
        .tab {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .tab button {
            flex: 1;
            padding: 12px;
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            color: #888;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .tab button.active {
            background: #00a2ff;
            color: #fff;
            border-color: #00a2ff;
        }
        .tab button:hover {
            background: #2a2a4a;
            color: #fff;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-box input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 12px;
            border: none;
            background: #0f0f1a;
            color: #fff;
            font-size: 16px;
            outline: 1px solid #2a2a4a;
            transition: 0.2s;
        }
        .search-box input:focus {
            outline: 2px solid #00a2ff;
        }
        .search-box button {
            padding: 14px 30px;
            background: #00a2ff;
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .search-box button:hover {
            background: #0088dd;
        }
        #results {
            background: #0f0f1a;
            border-radius: 12px;
            padding: 20px;
            min-height: 200px;
            border: 1px solid #2a2a4a;
            color: #ccc;
            font-size: 14px;
            line-height: 1.8;
            white-space: pre-wrap;
            word-break: break-all;
        }
        #results a {
            color: #00a2ff;
            text-decoration: none;
        }
        #results a:hover {
            text-decoration: underline;
        }
        .status {
            color: #888;
            text-align: center;
            padding: 20px;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #444;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔍 <span>OSINT</span> Search</h1>

    <div class="tab" id="tabContainer">
        <button class="active" data-type="phone">📱 Номер</button>
        <button data-type="username">👤 Username</button>
        <button data-type="name">📛 ФИО</button>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Введите номер, ник или ФИО...">
        <button id="searchBtn">Искать</button>
    </div>

    <div id="results">
        <div class="status">Введите данные и нажмите «Искать»</div>
    </div>
    <div class="footer">Информация собирается из открытых источников. Точность не гарантирована.</div>
</div>

<script>
    // -------- ЛОГИКА ----------
    const input = document.getElementById('searchInput');
    const btn = document.getElementById('searchBtn');
    const results = document.getElementById('results');
    const tabs = document.querySelectorAll('.tab button');

    let currentType = 'phone';

    tabs.forEach(tab => {
        tab.addEventListener('click', function() {
            tabs.forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            currentType = this.dataset.type;
            input.placeholder = currentType === 'phone' ? 'Введите номер (+7...)' :
                               currentType === 'username' ? 'Введите никнейм' :
                               'Введите ФИО';
            results.innerHTML = '<div class="status">Выберите тип и введите данные</div>';
        });
    });

    btn.addEventListener('click', runSearch);
    input.addEventListener('keydown', function(e) { if (e.key === 'Enter') runSearch(); });

    function runSearch() {
        const query = input.value.trim();
        if (!query) {
            results.innerHTML = '<div class="status">⚠️ Введите данные для поиска</div>';
            return;
        }

        results.innerHTML = '<div class="status">⏳ Поиск... (это может занять несколько секунд)</div>';

        let output = '';
        if (currentType === 'phone') {
            output = searchPhone(query);
        } else if (currentType === 'username') {
            output = searchUsername(query);
        } else if (currentType === 'name') {
            output = searchName(query);
        }

        // Имитация задержки (для реализма)
        setTimeout(() => {
            results.innerHTML = output;
        }, 800);
    }

    // ---------- ПОИСК ПО НОМЕРУ ----------
    function searchPhone(phone) {
        let html = '📱 <b>Результаты для номера:</b> ' + phone + '\n\n';
        // Проверка через numverify (публичное API) — только инфо о номере
        html += '🔍 <b>Информация о номере (через open API):</b>\n';
        html += '→ <a href="https://numverify.com/" target="_blank">Проверить на numverify.com</a>\n';
        html += '→ <a href="https://www.truecaller.com/" target="_blank">Проверить в Truecaller</a>\n\n';

        html += '📌 <b>Проверка в утечках (LeakCheck):</b>\n';
        html += '→ <a href="https://leakcheck.net/search?query=' + encodeURIComponent(phone) + '" target="_blank">Искать в LeakCheck</a>\n\n';

        html += '📌 <b>Поиск в Telegram / WhatsApp:</b>\n';
        html += '→ <a href="https://t.me/' + phone.replace('+', '') + '" target="_blank">Telegram</a>\n';
        html += '→ <a href="https://wa.me/' + phone.replace('+', '').replace(/ /g, '') + '" target="_blank">WhatsApp</a>\n\n';

        html += '📌 <b>Поиск в Google:</b>\n';
        html += '→ <a href="https://www.google.com/search?q=' + encodeURIComponent(phone) + '" target="_blank">Искать в Google</a>\n\n';

        html += '📌 <b>Соцсети по номеру (VK, Instagram, Facebook):</b>\n';
        html += '→ <a href="https://vk.com/search?c[phone]=' + phone + '" target="_blank">VK</a>\n';
        html += '→ <a href="https://www.facebook.com/search/top/?q=' + encodeURIComponent(phone) + '" target="_blank">Facebook</a>\n';
        html += '→ <a href="https://www.instagram.com/accounts/phone_login/?phone=' + encodeURIComponent(phone) + '" target="_blank">Instagram (проверка)</a>\n';

        html += '\n💡 <i>Попробуйте также ввести номер в OSINT-боты Telegram: @Sherlock_TG_bot, @UsersBox_bot</i>';
        return html;
    }

    // ---------- ПОИСК ПО USERNAME ----------
    function searchUsername(username) {
        let html = '👤 <b>Результаты для username:</b> ' + username + '\n\n';
        // Список сайтов для проверки ников
        const sites = [
            { name: 'Instagram', url: 'https://instagram.com/' },
            { name: 'Twitter', url: 'https://twitter.com/' },
            { name: 'VK', url: 'https://vk.com/' },
            { name: 'GitHub', url: 'https://github.com/' },
            { name: 'TikTok', url: 'https://tiktok.com/@' },
            { name: 'YouTube', url: 'https://youtube.com/@' },
            { name: 'Reddit', url: 'https://reddit.com/user/' },
            { name: 'Pinterest', url: 'https://pinterest.com/' },
            { name: 'Twitch', url: 'https://twitch.tv/' },
            { name: 'Spotify', url: 'https://open.spotify.com/user/' },
            { name: 'Steam', url: 'https://steamcommunity.com/id/' },
            { name: 'Telegram', url: 'https://t.me/' }
        ];

        html += '🔍 <b>Проверка профилей на популярных сайтах:</b>\n';
        sites.forEach(site => {
            html += '→ <a href="' + site.url + encodeURIComponent(username) + '" target="_blank">' + site.name + '</a>\n';
        });

        html += '\n📌 <b>Дополнительные инструменты:</b>\n';
        html += '→ <a href="https://whatsmyname.app/username/' + encodeURIComponent(username) + '" target="_blank">WhatsMyName</a>\n';
        html += '→ <a href="https://sherlock.ibn.rip/search/' + encodeURIComponent(username) + '" target="_blank">Sherlock (online)</a>\n';
        html += '→ <a href="https://maigret.megadose.fr/search/' + encodeURIComponent(username) + '" target="_blank">Maigret (VK/ОК)</a>\n';

        html += '\n💡 <i>Попробуйте также поискать ник в Telegram-ботах: @Sherlock_TG_bot, @UsersBox_bot</i>';
        return html;
    }

    // ---------- ПОИСК ПО ФИО ----------
    function searchName(name) {
        let html = '📛 <b>Результаты для ФИО:</b> ' + name + '\n\n';
        html += '🔍 <b>Поиск в Google и Yandex:</b>\n';
        html += '→ <a href="https://www.google.com/search?q=' + encodeURIComponent(name) + '" target="_blank">Google</a>\n';
        html += '→ <a href="https://yandex.ru/search/?text=' + encodeURIComponent(name) + '" target="_blank">Yandex</a>\n\n';

        html += '📌 <b>Поиск в соцсетях (по имени):</b>\n';
        html += '→ <a href="https://vk.com/search?c[0]=people&c[q]=' + encodeURIComponent(name) + '" target="_blank">VK</a>\n';
        html += '→ <a href="https://www.facebook.com/search/top/?q=' + encodeURIComponent(name) + '" target="_blank">Facebook</a>\n';
        html += '→ <a href="https://www.instagram.com/web/search/top/?q=' + encodeURIComponent(name) + '" target="_blank">Instagram</a>\n';
        html += '→ <a href="https://www.ok.ru/search?q=' + encodeURIComponent(name) + '" target="_blank">Одноклассники</a>\n';
        html += '→ <a href="https://www.linkedin.com/search/results/all/?keywords=' + encodeURIComponent(name) + '" target="_blank">LinkedIn</a>\n\n';

        html += '📌 <b>Поиск в базах (номер/адрес):</b>\n';
        html += '→ <a href="https://leakcheck.net/search?query=' + encodeURIComponent(name) + '" target="_blank">LeakCheck</a>\n';
        html += '→ <a href="https://www.google.com/search?q=' + encodeURIComponent(name) + '+"телефон""' + '" target="_blank">Google (с номером)</a>\n';

        html += '\n💡 <i>Попробуйте также ввести ФИО в Telegram-ботах: @Sherlock_TG_bot, @UsersBox_bot</i>';
        return html;
    }
</script>
</body>
</html>
