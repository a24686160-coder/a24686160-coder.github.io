<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT — Божественный сканер</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#05050f;color:#d0d0e0;font-family:'Segoe UI',system-ui,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:16px;overflow-x:hidden}
        /* Анимация фона — частицы */
        #particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;background:radial-gradient(circle at 30% 40%, #0d0d2b, #05050f)}
        .glow{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.3;animation:float 10s infinite alternate}
        .g1{width:400px;height:400px;background:#3b9eff;top:-100px;left:-100px}
        .g2{width:500px;height:500px;background:#7a5cff;bottom:-150px;right:-150px;animation-delay:5s}
        @keyframes float{0%{transform:translate(0,0) scale(1)}100%{transform:translate(60px,-60px) scale(1.2)}}
        .card{position:relative;z-index:10;background:rgba(18,18,31,0.85);backdrop-filter:blur(18px);padding:35px;border-radius:32px;width:780px;max-width:100%;border:1px solid rgba(59,158,255,0.25);box-shadow:0 30px 80px rgba(59,158,255,0.15)}
        h1{font-size:30px;font-weight:800;display:flex;align-items:center;gap:12px;margin-bottom:4px;background:linear-gradient(135deg,#3b9eff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .sub{color:#7a7a9a;font-size:13px;margin-bottom:24px;border-left:2px solid #3b9eff;padding-left:14px}
        .tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
        .tabs button{padding:10px 18px;border-radius:14px;border:1px solid #28284a;background:#0e0e20;color:#888;font-weight:600;cursor:pointer;transition:.3s;font-size:13px;flex:1}
        .tabs button.active{background:#3b9eff;color:#fff;border-color:#3b9eff;box-shadow:0 0 30px rgba(59,158,255,0.25)}
        .row{display:flex;gap:12px;margin-bottom:20px}
        .row input{flex:1;padding:16px 20px;border-radius:16px;border:1px solid #28284a;background:#0a0a18;color:#fff;font-size:16px;outline:none;transition:.3s}
        .row input:focus{border-color:#3b9eff;box-shadow:0 0 30px rgba(59,158,255,0.1)}
        .row button{padding:16px 36px;border-radius:16px;background:linear-gradient(135deg,#3b9eff,#7a5cff);border:none;color:#fff;font-weight:700;font-size:16px;cursor:pointer;transition:.3s;box-shadow:0 4px 30px rgba(59,158,255,0.3)}
        .row button:hover{transform:scale(1.02);box-shadow:0 8px 40px rgba(59,158,255,0.5)}
        #output{background:#0a0a18;border-radius:18px;padding:22px;min-height:200px;border:1px solid #1a1a34;font-size:14px;line-height:1.9;overflow-x:auto;color:#c8c8e0}
        .status{color:#555;text-align:center;padding:35px 0}
        .hit{color:#7ae0a0}
        .info{color:#f0c070}
        .err{color:#f07070}
        .small{color:#555;font-size:12px}
        .divider{border-top:1px solid #1a1a34;margin:16px 0}
        .download-btn{background:rgba(59,158,255,0.12);border:1px solid #28284a;border-radius:12px;padding:8px 16px;color:#aaa;font-size:12px;cursor:pointer;transition:.2s;float:right}
        .download-btn:hover{background:#3b9eff;color:#fff}
        .footer{text-align:center;margin-top:18px;font-size:11px;color:#3a3a5a}
        ::-webkit-scrollbar{width:4px}
        ::-webkit-scrollbar-track{background:#0a0a18}
        ::-webkit-scrollbar-thumb{background:#3b9eff;border-radius:10px}
    </style>
</head>
<body>
<div id="particles"><div class="glow g1"></div><div class="glow g2"></div></div>
<div class="card">
    <h1>⚡ OSINT SCANNER</h1>
    <div class="sub">Божественный поиск по номеру, нику или ФИО — результат за секунды</div>

    <div class="tabs" id="tabs">
        <button class="active" data-mode="phone">📱 Номер</button>
        <button data-mode="nick">👤 Ник</button>
        <button data-mode="name">📛 ФИО</button>
    </div>

    <div class="row">
        <input id="input" placeholder="Введите номер, ник или ФИО...">
        <button id="go">Найти</button>
    </div>

    <div id="output"><div class="status">✨ Введите данные и нажмите «Найти»</div></div>
    <div class="footer">Информация из открытых источников • Точность не гарантирована</div>
</div>

<script>
// ====== ЯДРО ======
const input = document.getElementById('input');
const go = document.getElementById('go');
const out = document.getElementById('output');
const tabs = document.querySelectorAll('.tabs button');

let mode = 'phone';

tabs.forEach(b => {
    b.onclick = function() {
        tabs.forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        mode = this.dataset.mode;
        input.placeholder = mode==='phone' ? '+7 700 000 00 00' :
                            mode==='nick'  ? 'никнейм' :
                            'Иван Иванов';
        out.innerHTML = '<div class="status">✨ Готов к поиску</div>';
    };
});

go.onclick = run;
input.onkeydown = e => { if(e.key === 'Enter') run(); };

function run() {
    const q = input.value.trim();
    if(!q) { out.innerHTML = '<div class="status">⚠️ Введите данные</div>'; return; }
    out.innerHTML = '<div class="status">⏳ Сканирование...</div>';

    if(mode === 'phone') searchPhone(q);
    else if(mode === 'nick') searchNick(q);
    else searchName(q);
}

// ====== 1. ПО НОМЕРУ ======
function searchPhone(phone) {
    // Очищаем номер от пробелов и лишних символов
    let clean = phone.replace(/[^0-9+]/g, '');
    if(!clean.startsWith('+')) clean = '+' + clean;

    // 1. Veriphone API
    fetch(`https://api.veriphone.com/v1/verify?phone=${encodeURIComponent(clean)}`)
        .then(r => r.json())
        .then(data => {
            let html = `📱 <b>Номер:</b> ${clean}\n`;
            if(data.status === 'success' && data.valid) {
                html += `🌍 <b>Страна:</b> ${data.country_name} (${data.country_code})\n`;
                html += `📞 <b>Оператор:</b> ${data.carrier || 'неизвестно'}\n`;
                html += `📍 <b>Регион:</b> ${data.location || 'неизвестно'}\n`;
                html += `📌 <b>Тип:</b> ${data.line_type || 'неизвестно'}\n`;
                html += `🔢 <b>Международный:</b> ${data.international_format || '—'}\n`;
                html += `📎 <b>Локальный:</b> ${data.local_format || '—'}\n`;
                html += `\n${divider()}\n`;
                html += `🔎 <b>Привязки:</b>\n`;
                html += `→ <a href="https://t.me/${clean.replace('+','')}" target="_blank">Telegram</a>\n`;
                html += `→ <a href="https://wa.me/${clean.replace('+','').replace(/ /g,'')}" target="_blank">WhatsApp</a>\n`;
                html += `→ <a href="https://www.truecaller.com/search/${clean}" target="_blank">Truecaller</a>\n`;
                html += `→ <a href="https://leakcheck.net/search?query=${encodeURIComponent(clean)}" target="_blank">LeakCheck</a>\n`;
                html += `→ <a href="https://vk.com/search?c[phone]=${clean}" target="_blank">VK</a>\n`;
            } else {
                html += `❌ <span class="err">Номер не найден или невалидный</span>\n`;
            }
            html += `\n${divider()}\n`;
            html += `<button class="download-btn" onclick="downloadReport('${encodeURIComponent(html)}')">📥 Скачать отчёт</button>`;
            out.innerHTML = html;
        })
        .catch(() => {
            // fallback — если API упал, даём альтернативу
            let html = `📱 <b>Номер:</b> ${clean}\n`;
            html += `❌ <span class="err">Ошибка API. Но ты всё равно можешь проверить:</span>\n`;
            html += `→ <a href="https://www.truecaller.com/search/${clean}" target="_blank">Truecaller</a>\n`;
            html += `→ <a href="https://leakcheck.net/search?query=${encodeURIComponent(clean)}" target="_blank">LeakCheck</a>\n`;
            html += `→ <a href="https://t.me/${clean.replace('+','')}" target="_blank">Telegram</a>\n`;
            html += `→ <a href="https://wa.me/${clean.replace('+','').replace(/ /g,'')}" target="_blank">WhatsApp</a>\n`;
            html += `\n${divider()}\n`;
            html += `<button class="download-btn" onclick="downloadReport('${encodeURIComponent(html)}')">📥 Скачать отчёт</button>`;
            out.innerHTML = html;
        });
}

// ====== 2. ПО НИКУ ======
function searchNick(nick) {
    let html = `👤 <b>Ник:</b> ${nick}\n\n`;

    fetch(`https://whatsmyname.app/api/v1/username/${nick}`)
        .then(r => r.json())
        .then(data => {
            let found = false;
            if(data && data.sites) {
                for(let site of data.sites) {
                    if(site.status === 'claimed') {
                        html += `✅ <a href="${site.url}" target="_blank">${site.name}</a>\n`;
                        found = true;
                    }
                }
            }
            if(!found) html += `❌ <span class="err">Профили не найдены</span>\n`;
            html += `\n${divider()}\n`;
            html += `<button class="download-btn" onclick="downloadReport('${encodeURIComponent(html)}')">📥 Скачать отчёт</button>`;
            out.innerHTML = html;
        })
        .catch(() => {
            const sites = [
                ['Instagram', `https://instagram.com/${nick}`],
                ['VK', `https://vk.com/${nick}`],
                ['GitHub', `https://github.com/${nick}`],
                ['TikTok', `https://tiktok.com/@${nick}`],
                ['Twitter', `https://twitter.com/${nick}`],
                ['YouTube', `https://youtube.com/@${nick}`],
                ['Reddit', `https://reddit.com/user/${nick}`],
                ['Twitch', `https://twitch.tv/${nick}`],
                ['Pinterest', `https://pinterest.com/${nick}`],
                ['Steam', `https://steamcommunity.com/id/${nick}`],
                ['Telegram', `https://t.me/${nick}`]
            ];
            html += `🔍 <b>Проверь профили:</b>\n`;
            for(let [name, url] of sites) {
                html += `→ <a href="${url}" target="_blank">${name}</a>\n`;
            }
            html += `\n${divider()}\n`;
            html += `<button class="download-btn" onclick="downloadReport('${encodeURIComponent(html)}')">📥 Скачать отчёт</button>`;
            out.innerHTML = html;
        });
}

// ====== 3. ПО ФИО ======
function searchName(name) {
    let html = `📛 <b>ФИО:</b> ${name}\n\n`;
    html += `🔍 <b>Поиск в открытых источниках:</b>\n`;
    html += `→ <a href="https://www.google.com/search?q=${encodeURIComponent(name)}" target="_blank">Google</a>\n`;
    html += `→ <a href="https://yandex.ru/search/?text=${encodeURIComponent(name)}" target="_blank">Яндекс</a>\n`;
    html += `→ <a href="https://vk.com/search?c[0]=people&c[q]=${encodeURIComponent(name)}" target="_blank">VK</a>\n`;
    html += `→ <a href="https://www.facebook.com/search/top/?q=${encodeURIComponent(name)}" target="_blank">Facebook</a>\n`;
    html += `→ <a href="https://www.ok.ru/search?q=${encodeURIComponent(name)}" target="_blank">Одноклассники</a>\n`;
    html += `→ <a href="https://www.linkedin.com/search/results/all/?keywords=${encodeURIComponent(name)}" target="_blank">LinkedIn</a>\n`;
    html += `\n${divider()}\n`;
    html += `<button class="download-btn" onclick="downloadReport('${encodeURIComponent(html)}')">📥 Скачать отчёт</button>`;
    out.innerHTML = html;
}

function divider() { return '─'.repeat(50); }

// ====== СКАЧИВАНИЕ ОТЧЁТА ======
function downloadReport(encoded) {
    const text = decodeURIComponent(encoded);
    const blob = new Blob([text.replace(/<[^>]*>/g, '')], {type: 'text/plain'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'OSINT_report.txt';
    a.click();
}
</script>
</body>
</html>
