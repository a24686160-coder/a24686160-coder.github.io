<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT Scanner</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a16;color:#d0d0e0;font-family:'Segoe UI',system-ui,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:16px}
        .card{background:#12121f;padding:30px;border-radius:26px;width:720px;max-width:100%;border:1px solid #28283f;box-shadow:0 20px 60px rgba(0,0,0,.8)}
        h1{font-size:26px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:10px}
        h1 span{color:#3b9eff}
        .sub{color:#666;font-size:13px;margin-bottom:22px}
        .tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
        .tabs button{padding:10px 16px;border-radius:12px;border:1px solid #28283f;background:#0e0e1c;color:#888;font-weight:600;cursor:pointer;transition:.2s;font-size:13px;flex:1}
        .tabs button.active{background:#3b9eff;color:#fff;border-color:#3b9eff}
        .row{display:flex;gap:10px;margin-bottom:18px}
        .row input{flex:1;padding:14px 18px;border-radius:14px;border:1px solid #28283f;background:#0a0a16;color:#fff;font-size:15px;outline:none;transition:.2s}
        .row input:focus{border-color:#3b9eff}
        .row button{padding:14px 28px;border-radius:14px;background:#3b9eff;border:none;color:#fff;font-weight:700;font-size:15px;cursor:pointer;transition:.2s}
        .row button:hover{background:#2a7fdd}
        #output{background:#0a0a16;border-radius:16px;padding:20px;min-height:200px;border:1px solid #1a1a2e;font-size:14px;line-height:1.8;overflow-x:auto;color:#c0c0d0}
        .status{color:#555;text-align:center;padding:30px 0}
        .hit{color:#7ae0a0}
        .info{color:#f0c070}
        .err{color:#f07070}
        .small{color:#555;font-size:12px}
        .divider{border-top:1px solid #1a1a2e;margin:14px 0}
    </style>
</head>
<body>
<div class="card">
    <h1>🔍 <span>OSINT</span> Scanner</h1>
    <div class="sub">Автоматический поиск по номеру, нику или ФИО</div>

    <div class="tabs" id="tabs">
        <button class="active" data-mode="phone">📱 Номер</button>
        <button data-mode="nick">👤 Ник</button>
        <button data-mode="name">📛 ФИО</button>
    </div>

    <div class="row">
        <input id="input" placeholder="Введите номер, ник или ФИО...">
        <button id="go">Найти</button>
    </div>

    <div id="output"><div class="status">Введите данные и нажмите «Найти»</div></div>
</div>

<script>
// ====== ЯДРО ======
const input = document.getElementById('input');
const go = document.getElementById('go');
const out = document.getElementById('output');
const tabs = document.querySelectorAll('.tabs button');

let mode = 'phone';

tabs.forEach(b => {
    b.onclick = function() {
        tabs.forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        mode = this.dataset.mode;
        input.placeholder = mode==='phone' ? '+7 700 000 00 00' :
                            mode==='nick'  ? 'никнейм' :
                            'Иван Иванов';
        out.innerHTML = '<div class="status">Готов к поиску</div>';
    };
});

go.onclick = run;
input.onkeydown = e => { if(e.key === 'Enter') run(); };

function run() {
    const q = input.value.trim();
    if(!q) { out.innerHTML = '<div class="status">⚠️ Введите данные</div>'; return; }
    out.innerHTML = '<div class="status">⏳ Сканирование...</div>';

    if(mode === 'phone') searchPhone(q);
    else if(mode === 'nick') searchNick(q);
    else searchName(q);
}

// ====== 1. ПО НОМЕРУ ======
function searchPhone(phone) {
    fetch(`https://api.veriphone.com/v1/verify?phone=${phone}`)
        .then(r => r.json())
        .then(data => {
            let html = `📱 <b>Номер:</b> ${phone}\n`;
            if(data.status === 'success' && data.valid) {
                html += `🌍 <b>Страна:</b> ${data.country_name} (${data.country_code})\n`;
                html += `📞 <b>Оператор:</b> ${data.carrier || 'неизвестно'}\n`;
                html += `📍 <b>Регион:</b> ${data.location || 'неизвестно'}\n`;
                html += `📌 <b>Тип:</b> ${data.line_type || 'неизвестно'}\n`;
                html += `🔢 <b>Международный:</b> ${data.international_format || '—'}\n`;
                html += `📎 <b>Локальный:</b> ${data.local_format || '—'}\n`;
                html += `\n${divider()}\n`;
                // Автоматическая проверка привязок
                html += `🔎 <b>Проверка привязок:</b>\n`;
                html += `→ Telegram: <a href="https://t.me/${phone.replace('+','')}" target="_blank">открыть</a>\n`;
                html += `→ WhatsApp: <a href="https://wa.me/${phone.replace('+','').replace(/ /g,'')}" target="_blank">открыть</a>\n`;
                html += `→ Truecaller: <a href="https://www.truecaller.com/search/${phone}" target="_blank">проверить</a>\n`;
                html += `→ LeakCheck: <a href="https://leakcheck.net/search?query=${encodeURIComponent(phone)}" target="_blank">проверить</a>\n`;
            } else {
                html += `❌ <span class="err">Номер невалидный или не найден</span>\n`;
            }
            out.innerHTML = html;
        })
        .catch(() => {
            out.innerHTML = `❌ <span class="err">Ошибка запроса. Проверь номер.\n\n</span>🔍 <span class="small">Используй Truecaller, LeakCheck, бот @Sherlock_TG_bot</span>`;
        });
}

// ====== 2. ПО НИКУ ======
function searchNick(nick) {
    let html = `👤 <b>Ник:</b> ${nick}\n\n`;

    fetch(`https://whatsmyname.app/api/v1/username/${nick}`)
        .then(r => r.json())
        .then(data => {
            let found = false;
            if(data && data.sites) {
                for(let site of data.sites) {
                    if(site.status === 'claimed') {
                        html += `✅ <a href="${site.url}" target="_blank">${site.name}</a>\n`;
                        found = true;
                    }
                }
            }
            if(!found) html += `❌ <span class="err">Профили не найдены</span>\n`;

            html += `\n${divider()}\n`;
            html += `🔍 <span class="small">Проверь вручную: Instagram, VK, GitHub, TikTok, Twitter, YouTube, Reddit, Twitch, Pinterest, Steam, Telegram</span>`;
            out.innerHTML = html;
        })
        .catch(() => {
            const sites = [
                ['Instagram', `https://instagram.com/${nick}`],
                ['VK', `https://vk.com/${nick}`],
                ['GitHub', `https://github.com/${nick}`],
                ['TikTok', `https://tiktok.com/@${nick}`],
                ['Twitter', `https://twitter.com/${nick}`],
                ['YouTube', `https://youtube.com/@${nick}`],
                ['Reddit', `https://reddit.com/user/${nick}`],
                ['Twitch', `https://twitch.tv/${nick}`],
                ['Pinterest', `https://pinterest.com/${nick}`],
                ['Steam', `https://steamcommunity.com/id/${nick}`],
                ['Telegram', `https://t.me/${nick}`]
            ];
            html += `🔍 <b>Проверь профили:</b>\n`;
            for(let [name, url] of sites) {
                html += `→ <a href="${url}" target="_blank">${name}</a>\n`;
            }
            out.innerHTML = html;
        });
}

// ====== 3. ПО ФИО ======
function searchName(name) {
    let html = `📛 <b>ФИО:</b> ${name}\n\n`;
    html += `🔍 <b>Поиск в открытых источниках:</b>\n`;
    html += `→ <a href="https://www.google.com/search?q=${encodeURIComponent(name)}" target="_blank">Google</a>\n`;
    html += `→ <a href="https://yandex.ru/search/?text=${encodeURIComponent(name)}" target="_blank">Яндекс</a>\n`;
    html += `→ <a href="https://vk.com/search?c[0]=people&c[q]=${encodeURIComponent(name)}" target="_blank">VK</a>\n`;
    html += `→ <a href="https://www.facebook.com/search/top/?q=${encodeURIComponent(name)}" target="_blank">Facebook</a>\n`;
    html += `→ <a href="https://www.ok.ru/search?q=${encodeURIComponent(name)}" target="_blank">Одноклассники</a>\n`;
    html += `→ <a href="https://www.linkedin.com/search/results/all/?keywords=${encodeURIComponent(name)}" target="_blank">LinkedIn</a>\n\n`;
    html += `📌 <span class="small">Если есть номер — поиск будет точнее</span>`;
    out.innerHTML = html;
}

function divider() { return '─'.repeat(40); }
</script>
</body>
</html>
