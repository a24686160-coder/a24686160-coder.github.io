<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWILL SEARCH</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0f;font-family:'Courier New',monospace;color:#c0c0d0;min-height:100vh;display:flex;justify-content:center;align-items:center}
        .c{width:100%;max-width:900px;padding:20px}
        .h{text-align:center;margin-bottom:30px}
        .h1{font-size:36px;background:linear-gradient(135deg,#00ff88,#00ddff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:3px}
        .sub{font-size:10px;color:#333;letter-spacing:4px;margin-top:8px}
        .tabs{display:flex;gap:4px}
        .tab{flex:1;padding:14px;background:#111118;border:1px solid #1a1a2e;border-radius:10px 10px 0 0;cursor:pointer;text-align:center;color:#555;font-weight:700;font-size:13px;letter-spacing:1px;transition:all .3s}
        .tab.on{color:#00ff88;background:#14141f}
        .card{background:#111118;border:1px solid #1a1a2e;border-radius:0 0 14px 14px;padding:25px}
        .sb{display:flex;gap:10px;margin-bottom:20px}
        .si{flex:1;padding:14px 18px;background:#0a0a0f;border:2px solid #1a1a2e;border-radius:10px;color:#fff;font-family:monospace;font-size:15px;outline:none;transition:.3s}
        .si:focus{border-color:#00ff88}
        .btn{padding:14px 28px;background:linear-gradient(135deg,#00ff88,#00cc66);border:none;border-radius:10px;color:#000;font-weight:700;font-size:13px;letter-spacing:1px;cursor:pointer;transition:.3s}
        .btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,255,136,0.3)}
        .btn:disabled{opacity:0.5;transform:none;cursor:not-allowed}
        .rs{margin-bottom:15px;border:1px solid #1a1a2e;border-radius:8px;overflow:hidden}
        .rsh{padding:12px 16px;background:#0d0d16;color:#00ff88;font-weight:700;font-size:11px;letter-spacing:2px;border-bottom:1px solid #1a1a2e}
        .rr{padding:10px 16px;border-bottom:1px solid rgba(255,255,255,0.03);display:flex;justify-content:space-between}
        .rr:last-child{border-bottom:none}
        .rl{font-size:10px;color:#666;text-transform:uppercase}
        .rv{font-size:13px;color:#ddd;font-weight:700}
        .rv.g{color:#00ff88}
        .rv.b{color:#00ddff}
        .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:8px;background:#00ff88}
        .load{text-align:center;padding:30px}
        .spinner{width:30px;height:30px;border:2px solid #1a1a2e;border-top:2px solid #00ff88;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 15px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .ft{text-align:center;margin-top:20px;font-size:9px;color:#222;letter-spacing:2px}
    </style>
</head>
<body>
    <div class="c">
        <div class="h">
            <div class="h1">SWILL SEARCH</div>
            <div class="sub">SECURE SEARCH SYSTEM</div>
        </div>
        <div class="tabs">
            <div class="tab on" onclick="st('phone',this)">Phone</div>
            <div class="tab" onclick="st('fio',this)">FIO</div>
            <div class="tab" onclick="st('username',this)">Username</div>
        </div>
        <div class="card">
            <div class="sb">
                <input class="si" id="q" placeholder="Enter data..." onkeydown="if(event.key==='Enter')ds()">
                <button class="btn" id="b" onclick="ds()">SEARCH</button>
            </div>
            <div id="r"></div>
        </div>
        <div class="ft">SWILL SEARCH v3.0</div>
    </div>
    <script>
        var ct='phone';
        function st(t,el){
            ct=t;
            document.querySelectorAll('.tab').forEach(e=>e.classList.remove('on'));
            el.classList.add('on');
            var ph={phone:'Enter phone number...',fio:'Enter full name...',username:'Enter username...'};
            document.getElementById('q').placeholder=ph[t];
            document.getElementById('q').value='';
            document.getElementById('r').innerHTML='';
        }
        async function ds(){
            var q=document.getElementById('q').value.trim();
            if(!q)return;
            var btn=document.getElementById('b');
            var res=document.getElementById('r');
            btn.disabled=true;
            btn.textContent='...';
            res.innerHTML='<div class="load"><div class="spinner"></div><div style="color:#00ff88;">Searching databases...</div></div>';
            try{
                var resp=await fetch('/api/search',{
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({type:ct,query:q})
                });
                var d=await resp.json();
                rr(d);
            }catch(e){
                res.innerHTML='<div style="text-align:center;color:#ff0044;padding:20px;">Connection error</div>';
            }
            btn.disabled=false;
            btn.textContent='SEARCH';
        }
        function rr(d){
            var h='';
            if(d.found){
                h+='<div class="rs"><div class="rsh"><span class="dot"></span>BASIC INFO</div>';
                for(var k in d.basic){
                    h+='<div class="rr"><span class="rl">'+k+'</span><span class="rv '+(d.basic[k]&&d.basic[k].toString().match(/^[7-8]\d{10}$/)?'g':'')+'">'+(d.basic[k]||'N/A')+'</span></div>';
                }
                h+='</div>';
                if(d.extra&&Object.keys(d.extra).length>0){
                    h+='<div class="rs"><div class="rsh">EXTRA DATA</div>';
                    for(var k in d.extra){
                        h+='<div class="rr"><span class="rl">'+k+'</span><span class="rv">'+d.extra[k]+'</span></div>';
                    }
                    h+='</div>';
                }
                if(d.accounts&&d.accounts.length>0){
                    h+='<div class="rs"><div class="rsh">ACCOUNTS ('+d.accounts.length+')</div>';
                    d.accounts.forEach(function(a){
                        h+='<div class="rr"><span class="rl">'+a.platform+'</span><span class="rv">'+a.username+'</span></div>';
                    });
                    h+='</div>';
                }
                h+='<div class="rs"><div class="rsh">SOURCES</div><div class="rr"><span class="rl">Checked</span><span class="rv">'+(d.sources_checked||0)+'</span></div><div class="rr"><span class="rl">Found</span><span class="rv b">'+(d.sources_found||0)+'</span></div></div>';
            }else{
                h='<div style="text-align:center;padding:30px;"><div style="font-size:40px;margin-bottom:10px;">No data</div><div style="color:#666;">Checked '+(d.sources_checked||0)+' sources</div></div>';
            }
            document.getElementById('r').innerHTML=h;
        }
    </script>
</body>
</html>
